name: Documentation CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/**/*.py'
      - 'docs/source/**'
      - 'requirements.txt'
  pull_request:
    branches: [main, master]

jobs:
  # ── Job 1: Перевірка якості docstrings ───────────────────────────────────
  lint-docs:
    name: Lint Docstrings (pydocstyle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting dependencies
        run: pip install pydocstyle

      - name: Check docstring coverage and format
        run: |
          pydocstyle apps/ \
            --convention=google \
            --match='(?!migrations|seed_data|__pycache__).*\.py' \
            --add-ignore=D100,D104,D106
        # D100: missing docstring in public module (дозволяємо для __init__)
        # D104: missing docstring in public package
        # D106: missing docstring in public nested class

  # ── Job 2: Збірка Sphinx документації ────────────────────────────────────
  build-docs:
    name: Build Sphinx Documentation
    runs-on: ubuntu-latest
    needs: lint-docs
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install Sphinx
        run: pip install sphinx sphinx-rtd-theme

      - name: Build HTML documentation
        run: sphinx-build -b html docs/source docs/build/html -W
        # -W: warnings as errors — документація без помилок

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-documentation
          path: docs/build/html/
          retention-days: 30

  # ── Job 3: Запуск тестів ──────────────────────────────────────────────────
  test:
    name: Run Tests (Living Documentation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        run: python manage.py test tests/ --verbosity=2
        env:
          DJANGO_SETTINGS_MODULE: service_center.settings

  # ── Job 4: Публікація на GitHub Pages (тільки main/master) ───────────────
  deploy-docs:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-docs, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install all dependencies
        run: |
          pip install -r requirements.txt
          pip install sphinx sphinx-rtd-theme

      - name: Build HTML documentation
        run: sphinx-build -b html docs/source docs/build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html
          destination_dir: docs
          commit_message: "docs: auto-publish documentation [skip ci]"
